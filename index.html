<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>taxuslor</title>
  <script>
    // Read saved theme before paint to set initial background & prevent flash
    window.__savedDark = (function() {
      var t = localStorage.getItem('theme');
      if (t === 'light') return false;
      if (t === 'dark')  return true;
      return true; // default dark
    })();
    document.documentElement.style.background = window.__savedDark ? '#0b0b0b' : '#f0ede8';
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=IBM+Plex+Mono:wght@300;400&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      overflow: hidden;
      font-family: 'Space Grotesk', sans-serif;
      cursor: crosshair;
      height: 100vh;
      width: 100vw;
      background: #0b0b0b;
    }

    canvas#bg { position: fixed; inset: 0; z-index: 0; }

    /* ---- Watermark ---- */
    .watermark {
      position: fixed; bottom: 2rem; left: 2.5rem;
      z-index: 10; pointer-events: none; user-select: none;
    }
    .watermark h1 {
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 300; font-size: 0.85rem;
      letter-spacing: 0.15em; text-transform: uppercase;
    }
    .watermark p {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.65rem; margin-top: 0.25rem;
      letter-spacing: 0.08em;
    }

    /* ---- Hint ---- */
    .hint {
      position: fixed; top: 2rem; right: 2.5rem; z-index: 10;
      pointer-events: none;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.65rem; text-align: right;
      letter-spacing: 0.04em; line-height: 1.8;
      transition: opacity 1.5s ease;
    }

    /* ---- Theme toggle ---- */
    .theme-toggle {
      position: fixed; bottom: 2rem; right: 2.5rem; z-index: 20;
      width: 38px; height: 38px; border-radius: 50%;
      border: 1px solid rgba(128,128,128,0.2);
      background: rgba(128,128,128,0.06);
      backdrop-filter: blur(12px);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.4s ease;
    }
    .theme-toggle:hover {
      border-color: rgba(128,128,128,0.4);
      transform: scale(1.1);
    }
    .theme-toggle svg {
      width: 16px; height: 16px;
      transition: transform 0.5s;
    }
    .theme-toggle:hover svg { transform: rotate(30deg); }

    /* ---- Key indicator ---- */
    .key-indicator {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 15; pointer-events: none;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 6rem; font-weight: 300;
      letter-spacing: 0.05em;
      opacity: 0; transition: opacity 0.3s ease;
      text-transform: uppercase;
    }
    .key-indicator.active { opacity: 1; }

    /* ---- Tooltip ---- */
    .tooltip {
      position: fixed; z-index: 20; pointer-events: none;
      opacity: 0; transition: opacity 0.25s ease; max-width: 280px;
    }
    .tooltip.active { opacity: 1; }
    .tooltip-inner {
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 10px; padding: 1rem 1.25rem;
    }
    .tooltip-name { font-weight: 500; font-size: 0.95rem; margin-bottom: 0.3rem; }
    .tooltip-desc { font-size: 0.78rem; line-height: 1.5; margin-bottom: 0.6rem; }
    .tooltip-tags { display: flex; flex-wrap: wrap; gap: 0.3rem; }
    .tooltip-tag {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.6rem; padding: 0.15rem 0.5rem; border-radius: 3px;
    }
    .tooltip-cta {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.6rem; margin-top: 0.6rem; letter-spacing: 0.06em;
    }

    /* ---- Ripple ---- */
    .ripple {
      position: fixed; border-radius: 50%;
      pointer-events: none; z-index: 5;
      animation: rippleOut 0.8s ease-out forwards;
    }
    @keyframes rippleOut {
      0%   { transform: scale(0); opacity: 0.5; }
      100% { transform: scale(1); opacity: 0; }
    }
  </style>
</head>
<body>

  <canvas id="bg"></canvas>

  <div class="watermark">
    <h1>taxuslor</h1>
    <p>.... . .-.. .-.. ---</p>
  </div>

  <div class="hint" id="hint">
    --. --- --- -.. -... -.-- .
  </div>

  <div class="key-indicator" id="keyIndicator"></div>

  <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
    <svg id="iconMoon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/>
    </svg>
    <svg id="iconSun" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="display:none">
      <circle cx="12" cy="12" r="5"/>
      <line x1="12" y1="1" x2="12" y2="3" stroke-linecap="round" stroke-width="2"/>
      <line x1="12" y1="21" x2="12" y2="23" stroke-linecap="round" stroke-width="2"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" stroke-linecap="round" stroke-width="2"/>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" stroke-linecap="round" stroke-width="2"/>
      <line x1="1" y1="12" x2="3" y2="12" stroke-linecap="round" stroke-width="2"/>
      <line x1="21" y1="12" x2="23" y2="12" stroke-linecap="round" stroke-width="2"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" stroke-linecap="round" stroke-width="2"/>
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" stroke-linecap="round" stroke-width="2"/>
    </svg>
  </button>

  <div class="tooltip" id="tooltip">
    <div class="tooltip-inner">
      <div class="tooltip-name" id="tt-name"></div>
      <div class="tooltip-desc" id="tt-desc"></div>
      <div class="tooltip-tags" id="tt-tags"></div>
      <div class="tooltip-cta">click to open &rarr;</div>
    </div>
  </div>

<script>
// ============================================================
//  PROJECTS CONFIG
// ============================================================
const PROJECTS = [
  {
    name: 'TBD',
    desc: 'TBD',
    tags: ['TBD'],
    url: 'https://taxuslor.github.io/',
    hue: 28,
  },
  {
    name: 'TBD',
    desc: 'TBD',
    tags: ['TBD'],
    url: 'https://taxuslor.github.io/',
    hue: 160,
  },
  {
    name: 'TBD',
    desc: 'TBD',
    tags: ['TBD'],
    url: 'https://taxuslor.github.io/',
    hue: 210,
  },
  {
    name: 'TBD',
    desc: 'TBD',
    tags: ['TBD'],
    url: 'https://taxuslor.github.io/',
    hue: 340,
  },
  {
    name: 'Blog',
    desc: 'Silly thoughts on random stuff.',
    tags: ['Writing'],
    url: 'https://taxuslor.github.io/blog',
    hue: 50,
  },
];

// ============================================================
//  THEME — always deep-copy to avoid shared-reference bugs
// ============================================================
let isDark = window.__savedDark !== undefined ? window.__savedDark : true;

function freshDark()  { return { bgC: [17,17,17], bgE: [6,6,6],       pt: [255,255,255], ln: [255,255,255], labelL: 80 }; }
function freshLight() { return { bgC: [242,239,233], bgE: [225,220,210], pt: [0,0,0],       ln: [0,0,0],       labelL: 30 }; }

let theme  = isDark ? freshDark() : freshLight();
let target = isDark ? freshDark() : freshLight();

function lerpTheme(speed) {
  const s = speed || 0.045;
  for (const k of ['bgC','bgE','pt','ln']) {
    for (let i = 0; i < 3; i++) theme[k][i] += (target[k][i] - theme[k][i]) * s;
  }
  theme.labelL += (target.labelL - theme.labelL) * s;
}

// Update all non-canvas DOM colors
function syncDomColors() {
  const fg  = isDark ? '255,255,255' : '0,0,0';
  const svgFill = isDark ? 'rgba(255,255,255,0.35)' : 'rgba(0,0,0,0.35)';

  document.querySelector('.watermark h1').style.color = `rgba(${fg},0.2)`;
  document.querySelector('.watermark p').style.color  = `rgba(${fg},0.1)`;
  document.getElementById('hint').style.color          = `rgba(${fg},0.18)`;
  document.getElementById('keyIndicator').style.color  = `rgba(${fg},0.04)`;

  document.querySelectorAll('.theme-toggle svg').forEach(s => s.style.fill = svgFill);
  document.getElementById('iconSun').querySelectorAll('line').forEach(l => l.setAttribute('stroke', svgFill));
  document.getElementById('iconMoon').style.display = isDark ? 'block' : 'none';
  document.getElementById('iconSun').style.display  = isDark ? 'none'  : 'block';
}

document.getElementById('themeToggle').addEventListener('click', () => {
  if (zoom.active) return;
  isDark = !isDark;
  target = isDark ? freshDark() : freshLight();
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
  syncDomColors();
});

syncDomColors();   // init

// ============================================================
//  CANVAS
// ============================================================
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
let W, H, dpr;

function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  placeProjectNodes();
}
window.addEventListener('resize', () => { resize(); initParticles(); });

// ============================================================
//  PARTICLES
// ============================================================
const PARTICLE_COUNT = 260;
let particles = [];

function initParticles() {
  particles = [];
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    particles.push({
      x: Math.random() * W, y: Math.random() * H,
      vx: (Math.random() - 0.5) * 0.25, vy: (Math.random() - 0.5) * 0.25,
      r: Math.random() * 1.3 + 0.3,
      opacity: Math.random() * 0.3 + 0.04,
      twinklePhase: Math.random() * Math.PI * 2,
      twinkleSpeed: 0.5 + Math.random() * 1.5,
    });
  }
}

// ============================================================
//  SHOOTING STARS
// ============================================================
let shootingStars = [];

function maybeSpawnStar() {
  if (zoom.active || Math.random() > 0.003) return;
  const a = Math.PI * 0.15 + Math.random() * Math.PI * 0.25;
  const sp = 3 + Math.random() * 4;
  shootingStars.push({
    x: Math.random() * W * 0.8, y: -10,
    vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
    life: 1, decay: 0.012 + Math.random() * 0.015,
    len: 40 + Math.random() * 60,
  });
}

// ============================================================
//  MOUSE TRAIL
// ============================================================
let trail = [];

// ============================================================
//  PROJECT NODES
// ============================================================
let nodes = [];
const NODE_R = 6;
const HIT_R  = 44;

function placeProjectNodes() {
  const cx = W / 2, cy = H / 2;
  const spread = Math.min(W, H) * 0.28;
  const ga = Math.PI * (3 - Math.sqrt(5));

  nodes = PROJECTS.map((p, i) => {
    const r = spread * Math.sqrt((i + 0.5) / PROJECTS.length) * (0.75 + Math.random() * 0.25);
    const th = i * ga + (Math.random() - 0.5) * 0.35;
    const bx = cx + r * Math.cos(th), by = cy + r * Math.sin(th);
    return {
      ...p, x: bx, y: by, baseX: bx, baseY: by,
      phase: Math.random() * Math.PI * 2,
      pulsePhase: Math.random() * Math.PI * 2,
      hover: 0, highlight: 0,
      orbitParticles: Array.from({ length: 5 }, (_, j) => ({
        angle: (j / 5) * Math.PI * 2,
        dist: 18 + Math.random() * 8,
        speed: 0.6 + Math.random() * 0.4,
        r: 1 + Math.random() * 0.8,
      })),
    };
  });
}

// ============================================================
//  ZOOM-TO-NAVIGATE
// ============================================================
const zoom = { active: false, progress: 0, node: null, holdTimer: 0 };
const ZOOM_SPEED = 0.016;
const HOLD_FRAMES = 80; // ~1.3s at 60fps

function startZoom(node) {
  if (zoom.active) return;
  zoom.active = true;
  zoom.progress = 0;
  zoom.node = node;
  zoom.holdTimer = 0;
  tooltip.classList.remove('active');
}

function tickZoom() {
  if (!zoom.active) return;
  if (zoom.progress < 1) {
    zoom.progress += ZOOM_SPEED * (1 + zoom.progress * 2);
    if (zoom.progress > 1) zoom.progress = 1;
  } else {
    zoom.holdTimer++;
    if (zoom.holdTimer >= HOLD_FRAMES) {
      window.location.href = zoom.node.url;
    }
  }
}

function easeIO(t) { return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3) / 2; }

// ============================================================
//  KEYBOARD FILTER
// ============================================================
let activeKey = '';
let keyTimer = null;
const keyIndicator = document.getElementById('keyIndicator');

window.addEventListener('keydown', e => {
  if (zoom.active) return;
  if (e.key === 'Escape') {
    activeKey = ''; keyIndicator.classList.remove('active'); return;
  }
  if (e.key.length === 1 && /[a-zA-Z]/.test(e.key)) {
    activeKey = e.key.toUpperCase();
    keyIndicator.textContent = activeKey;
    keyIndicator.classList.add('active');
    clearTimeout(keyTimer);
    keyTimer = setTimeout(() => { activeKey = ''; keyIndicator.classList.remove('active'); }, 2000);
  }
});

// ============================================================
//  MOUSE
// ============================================================
let mouse = { x: -9999, y: -9999 };
let hoveredNode = null;

canvas.addEventListener('mousemove', e => {
  mouse.x = e.clientX; mouse.y = e.clientY;
  trail.push({ x: e.clientX, y: e.clientY, life: 1 });
  if (trail.length > 18) trail.shift();
});
canvas.addEventListener('mouseleave', () => { mouse.x = mouse.y = -9999; });

canvas.addEventListener('click', e => {
  if (zoom.active) return;
  if (hoveredNode) {
    spawnBurst(hoveredNode.x, hoveredNode.y, hoveredNode.hue);
    spawnRipple(e.clientX, e.clientY, hoveredNode.hue);
    startZoom(hoveredNode);
  }
});

// ============================================================
//  BURST PARTICLES
// ============================================================
let bursts = [];

function spawnBurst(x, y, hue) {
  for (let i = 0; i < 18; i++) {
    const a = (i / 18) * Math.PI * 2 + Math.random() * 0.3;
    const sp = 1.5 + Math.random() * 3;
    bursts.push({ x, y, hue, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp,
                  life: 1, decay: 0.02 + Math.random()*0.02, r: 1 + Math.random()*2 });
  }
}

function spawnRipple(x, y, hue) {
  const el = document.createElement('div');
  el.className = 'ripple';
  const sz = 150;
  el.style.cssText = `width:${sz}px;height:${sz}px;left:${x-sz/2}px;top:${y-sz/2}px;border:2px solid hsla(${hue},50%,70%,0.6)`;
  document.body.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
}

// ============================================================
//  TOOLTIP
// ============================================================
const tooltip = document.getElementById('tooltip');
const ttName = document.getElementById('tt-name');
const ttDesc = document.getElementById('tt-desc');
const ttTags = document.getElementById('tt-tags');

function updateTooltip() {
  if (zoom.active) { tooltip.classList.remove('active'); return; }
  if (!hoveredNode) { tooltip.classList.remove('active'); return; }

  const dk = isDark;
  ttName.textContent = hoveredNode.name;
  ttName.style.color = `hsl(${hoveredNode.hue},45%,${dk ? 78 : 40}%)`;
  ttDesc.textContent = hoveredNode.desc;
  ttDesc.style.color = dk ? 'rgba(255,255,255,0.4)' : 'rgba(0,0,0,0.45)';
  document.querySelector('.tooltip-cta').style.color = dk ? 'rgba(255,255,255,0.2)' : 'rgba(0,0,0,0.25)';

  const tiBg   = dk ? 'rgba(18,18,18,0.92)' : 'rgba(255,255,255,0.88)';
  const tiBdr  = dk ? '1px solid rgba(255,255,255,0.06)' : '1px solid rgba(0,0,0,0.07)';
  const ttInner = document.querySelector('.tooltip-inner');
  ttInner.style.background = tiBg; ttInner.style.border = tiBdr;

  const tagBg  = dk ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)';
  const tagClr = dk ? 'rgba(255,255,255,0.35)' : 'rgba(0,0,0,0.4)';
  ttTags.innerHTML = hoveredNode.tags.map(t =>
    `<span class="tooltip-tag" style="background:${tagBg};color:${tagClr}">${t}</span>`
  ).join('');

  let tx = mouse.x + 20, ty = mouse.y - 20;
  if (tx + 290 > W) tx = mouse.x - 300;
  if (ty + 160 > H) ty = mouse.y - 160;
  if (ty < 10) ty = 10;
  tooltip.style.left = tx + 'px'; tooltip.style.top = ty + 'px';
  tooltip.classList.add('active');
}

// ============================================================
//  HELPERS
// ============================================================
function HSL(h, s, l, a) { return a === undefined ? `hsl(${h},${s}%,${l}%)` : `hsla(${h},${s}%,${l}%,${a})`; }
function RGB(arr, a) { return `rgba(${arr[0]|0},${arr[1]|0},${arr[2]|0},${a})`; }

function hslToRgb(h, s, l) {
  s /= 100; l /= 100;
  const k = n => (n + h / 30) % 12;
  const a = s * Math.min(l, 1 - l);
  const f = n => l - a * Math.max(-1, Math.min(k(n) - 3, 9 - k(n), 1));
  return [f(0) * 255, f(8) * 255, f(4) * 255];
}

function lerpArr(a, b, t) { return a.map((v, i) => v + (b[i] - v) * t); }

// ============================================================
//  MAIN LOOP
// ============================================================
let time = 0;

function frame() {
  time += 0.008;
  lerpTheme();
  tickZoom();
  ctx.clearRect(0, 0, W, H);

  // ---- Zoom values ----
  const zp = zoom.active ? easeIO(Math.min(zoom.progress, 1)) : 0;
  const zN = zoom.node;
  const zoomScale = 1 + zp * 5;
  const camX = zN ? zN.x : W / 2;
  const camY = zN ? zN.y : H / 2;

  // World → screen
  function T(wx, wy) {
    return [ W/2 + (wx - camX) * zoomScale, H/2 + (wy - camY) * zoomScale ];
  }

  // ---- Background (blend toward node hue during zoom) ----
  let bgC = [...theme.bgC], bgE = [...theme.bgE];
  if (zoom.active && zN) {
    const nC = hslToRgb(zN.hue, isDark ? 20 : 25, isDark ? 8 : 88);
    const nE = hslToRgb(zN.hue, isDark ? 25 : 30, isDark ? 4 : 80);
    bgC = lerpArr(bgC, nC, zp);
    bgE = lerpArr(bgE, nE, zp);
  }
  const vg = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W,H) * 0.7);
  vg.addColorStop(0, RGB(bgC, 1));
  vg.addColorStop(1, RGB(bgE, 1));
  ctx.fillStyle = vg;
  ctx.fillRect(0, 0, W, H);

  // ---- Shooting stars (fade during zoom) ----
  maybeSpawnStar();
  const starA = 1 - zp;
  for (let i = shootingStars.length - 1; i >= 0; i--) {
    const s = shootingStars[i];
    s.x += s.vx; s.y += s.vy; s.life -= s.decay;
    if (s.life <= 0) { shootingStars.splice(i, 1); continue; }
    if (starA < 0.01) continue;
    const mg = Math.sqrt(s.vx*s.vx + s.vy*s.vy);
    const tX = s.x - (s.vx/mg) * s.len * s.life;
    const tY = s.y - (s.vy/mg) * s.len * s.life;
    const gr = ctx.createLinearGradient(tX, tY, s.x, s.y);
    gr.addColorStop(0, RGB(theme.pt, 0));
    gr.addColorStop(1, RGB(theme.pt, s.life * 0.35 * starA));
    ctx.beginPath(); ctx.moveTo(tX, tY); ctx.lineTo(s.x, s.y);
    ctx.strokeStyle = gr; ctx.lineWidth = 1.2; ctx.stroke();
  }

  // ---- Mouse trail ----
  for (let i = 0; i < trail.length; i++) trail[i].life -= 0.06;
  trail = trail.filter(t => t.life > 0);
  if (trail.length > 1 && zp < 0.5) {
    ctx.beginPath(); ctx.moveTo(trail[0].x, trail[0].y);
    for (let i = 1; i < trail.length; i++) ctx.lineTo(trail[i].x, trail[i].y);
    ctx.strokeStyle = RGB(theme.pt, 0.06 * (1 - zp * 2));
    ctx.lineWidth = 1; ctx.stroke();
  }

  // ---- Particles ----
  hoveredNode = null;
  const pFade = 1 - zp * 0.7;

  for (const p of particles) {
    p.x += p.vx; p.y += p.vy;
    const tw = Math.sin(time * p.twinkleSpeed + p.twinklePhase) * 0.5 + 0.5;
    const op = p.opacity * (0.4 + tw * 0.6) * pFade;

    if (!zoom.active) {
      const dx = p.x - mouse.x, dy = p.y - mouse.y;
      const d = Math.sqrt(dx*dx + dy*dy);
      if (d > 0 && d < 130) {
        const f = (130 - d) / 130 * 0.18;
        p.x += dx/d * f; p.y += dy/d * f;
      }
    }

    if (p.x < -10) p.x = W+10; if (p.x > W+10) p.x = -10;
    if (p.y < -10) p.y = H+10; if (p.y > H+10) p.y = -10;

    const [sx, sy] = T(p.x, p.y);
    if (sx < -50 || sx > W+50 || sy < -50 || sy > H+50) continue;
    ctx.beginPath(); ctx.arc(sx, sy, p.r * zoomScale, 0, Math.PI * 2);
    ctx.fillStyle = RGB(theme.pt, op);
    ctx.fill();
  }

  // ---- Particle connections (fade early) ----
  if (zp < 0.35) {
    const cA = 1 - zp * 3;
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x, dy = particles[i].y - particles[j].y;
        const d2 = dx*dx + dy*dy;
        if (d2 < 5500) {
          const [ax, ay] = T(particles[i].x, particles[i].y);
          const [bx, by] = T(particles[j].x, particles[j].y);
          ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(bx, by);
          ctx.strokeStyle = RGB(theme.ln, (1 - d2/5500) * 0.04 * cA);
          ctx.lineWidth = 0.4; ctx.stroke();
        }
      }
    }
  }

  // ---- Node-to-node connections ----
  if (zp < 0.5) {
    const nnA = 1 - zp * 2;
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const dx = nodes[i].x - nodes[j].x, dy = nodes[i].y - nodes[j].y;
        const d = Math.sqrt(dx*dx + dy*dy);
        const mxD = Math.min(W,H) * 0.5;
        if (d < mxD) {
          const [ax, ay] = T(nodes[i].x, nodes[i].y);
          const [bx, by] = T(nodes[j].x, nodes[j].y);
          ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(bx, by);
          ctx.strokeStyle = RGB(theme.ln, (1 - d/mxD) * 0.07 * nnA);
          ctx.lineWidth = 0.6; ctx.stroke();
        }
      }
    }
  }

  // ---- Node-to-particle connections ----
  if (zp < 0.45) {
    const npA = 1 - zp * 2.2;
    for (const nd of nodes) {
      for (const p of particles) {
        const dx = nd.x - p.x, dy = nd.y - p.y;
        const d = Math.sqrt(dx*dx + dy*dy);
        if (d < 110) {
          const [ax, ay] = T(nd.x, nd.y);
          const [bx, by] = T(p.x, p.y);
          ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(bx, by);
          ctx.strokeStyle = HSL(nd.hue, 30, isDark ? 60 : 45, (1 - d/110) * 0.1 * npA);
          ctx.lineWidth = 0.5; ctx.stroke();
        }
      }
    }
  }

  // ---- Project nodes ----
  for (const nd of nodes) {
    nd.x = nd.baseX + Math.sin(time + nd.phase) * 7;
    nd.y = nd.baseY + Math.cos(time * 0.7 + nd.phase) * 6;
    const [sx, sy] = T(nd.x, nd.y);

    const isZTarget = zoom.active && zN === nd;
    const nodeFade = zoom.active ? (isZTarget ? 1 : Math.max(0, 1 - zp * 3)) : 1;
    if (nodeFade < 0.01 && !isZTarget) continue;

    // Hit test
    if (!zoom.active) {
      const dx = mouse.x - sx, dy = mouse.y - sy;
      if (Math.sqrt(dx*dx + dy*dy) < HIT_R) hoveredNode = nd;
    }

    // Keyboard
    const keyMatch = activeKey && nd.name.toUpperCase().startsWith(activeKey);
    const hlTarget = activeKey ? (keyMatch ? 1 : -0.6) : 0;
    nd.highlight += (hlTarget - nd.highlight) * 0.08;

    // Hover lerp
    nd.hover += (((!zoom.active && hoveredNode === nd) ? 1 : 0) - nd.hover) * 0.1;

    const pulse = Math.sin(time * 2 + nd.pulsePhase) * 0.5 + 0.5;
    const bA = 0.15 + pulse * 0.1;
    const hB = nd.hover;
    const hlB = Math.max(0, nd.highlight);
    const dim = Math.max(0.15, 1 + Math.min(0, nd.highlight));
    const aS = nodeFade * dim;

    // Glow
    const gR = (NODE_R + 22 + hB * 30 + hlB * 15) * zoomScale;
    const gL = isDark ? 65 : 50;
    const glow = ctx.createRadialGradient(sx, sy, 0, sx, sy, gR);
    glow.addColorStop(0,   HSL(nd.hue, 40, gL, (bA + hB*0.3 + hlB*0.2) * 0.5 * aS));
    glow.addColorStop(0.4, HSL(nd.hue, 35, gL-10, (bA + hB*0.2) * 0.25 * aS));
    glow.addColorStop(1,   HSL(nd.hue, 30, gL-15, 0));
    ctx.beginPath(); ctx.arc(sx, sy, gR, 0, Math.PI * 2);
    ctx.fillStyle = glow; ctx.fill();

    // Orbit particles
    for (const op of nd.orbitParticles) {
      op.angle += op.speed * (1 + hB * 2 + hlB) * 0.02;
      const od = (op.dist + hB * 8) * zoomScale;
      const ox = sx + Math.cos(op.angle) * od;
      const oy = sy + Math.sin(op.angle) * od;
      ctx.beginPath(); ctx.arc(ox, oy, op.r * (0.6 + hB*0.4) * zoomScale, 0, Math.PI * 2);
      ctx.fillStyle = HSL(nd.hue, 35, isDark ? 75 : 50, (0.25 + hB*0.4) * aS);
      ctx.fill();
    }

    // Core
    const cR = NODE_R * (1 + hB * 0.6 + hlB * 0.3) * zoomScale;
    ctx.beginPath(); ctx.arc(sx, sy, cR, 0, Math.PI * 2);
    ctx.fillStyle = HSL(nd.hue, 45, isDark ? 72 : 55, (0.7 + hB*0.3) * aS);
    ctx.fill();

    // Inner bright
    ctx.beginPath(); ctx.arc(sx, sy, cR * 0.35, 0, Math.PI * 2);
    ctx.fillStyle = HSL(nd.hue, 25, isDark ? 92 : 85, (0.5 + hB*0.4) * aS);
    ctx.fill();

    // Label (hide when zoom target is deep)
    if (!(isZTarget && zp > 0.4)) {
      const lA = (0.22 + nd.hover * 0.6 + hlB * 0.5) * aS;
      const fSz = Math.min(0.72 * zoomScale, 3);
      ctx.font = `500 ${fSz}rem 'Space Grotesk', sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'top';
      ctx.fillStyle = HSL(nd.hue, 30, theme.labelL, lA);
      ctx.fillText(nd.name, sx, sy + cR + 12 * zoomScale);
    }

    // Key underline
    if (keyMatch && nd.highlight > 0.3 && !zoom.active) {
      ctx.font = `500 0.72rem 'Space Grotesk', sans-serif`;
      const ulW = ctx.measureText(nd.name).width;
      ctx.beginPath();
      ctx.moveTo(sx - ulW/2, sy + cR + 26);
      ctx.lineTo(sx + ulW/2, sy + cR + 26);
      ctx.strokeStyle = HSL(nd.hue, 40, isDark ? 70 : 45, nd.highlight * 0.5);
      ctx.lineWidth = 1; ctx.stroke();
    }
  }

  // ---- Zoom overlay: centered name + description ----
  if (zoom.active && zN && zp > 0.3) {
    const tA = easeIO(Math.min((zp - 0.3) / 0.4, 1));

    // Name
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = `600 1.6rem 'Space Grotesk', sans-serif`;
    ctx.fillStyle = HSL(zN.hue, 35, isDark ? 82 : 32, tA * 0.9);
    ctx.fillText(zN.name, W/2, H/2 - 20);

    // Description (word-wrap)
    ctx.font = `300 0.92rem 'Space Grotesk', sans-serif`;
    ctx.fillStyle = isDark ? `rgba(255,255,255,${tA * 0.5})` : `rgba(0,0,0,${tA * 0.5})`;
    const mxW = Math.min(W * 0.6, 480);
    const words = zN.desc.split(' ');
    let lines = [], cur = '';
    for (const w of words) {
      const test = cur ? cur + ' ' + w : w;
      if (ctx.measureText(test).width > mxW) { lines.push(cur); cur = w; }
      else cur = test;
    }
    if (cur) lines.push(cur);
    const lH = 24, startY = H/2 + 14;
    for (let i = 0; i < lines.length; i++) ctx.fillText(lines[i], W/2, startY + i * lH);

    // Tags
    if (tA > 0.5) {
      const tagA = (tA - 0.5) * 2;
      ctx.font = `400 0.7rem 'IBM Plex Mono', monospace`;
      ctx.fillStyle = HSL(zN.hue, 25, isDark ? 65 : 42, tagA * 0.4);
      ctx.fillText(zN.tags.join('  ·  '), W/2, startY + lines.length * lH + 24);
    }

    // Navigating hint
    if (zoom.progress >= 1) {
      const blinkA = (Math.sin(time * 4) * 0.5 + 0.5) * 0.3;
      ctx.font = `300 0.65rem 'IBM Plex Mono', monospace`;
      ctx.fillStyle = isDark ? `rgba(255,255,255,${blinkA})` : `rgba(0,0,0,${blinkA})`;
      ctx.fillText('navigating...', W/2, startY + lines.length * lH + 56);
    }
  }

  // ---- Burst particles ----
  for (let i = bursts.length - 1; i >= 0; i--) {
    const b = bursts[i];
    b.x += b.vx; b.y += b.vy; b.vx *= 0.97; b.vy *= 0.97; b.life -= b.decay;
    if (b.life <= 0) { bursts.splice(i, 1); continue; }
    const [bsx, bsy] = T(b.x, b.y);
    ctx.beginPath(); ctx.arc(bsx, bsy, b.r * b.life * zoomScale, 0, Math.PI * 2);
    ctx.fillStyle = HSL(b.hue, 45, isDark ? 72 : 55, b.life * 0.7);
    ctx.fill();
  }

  // ---- Cursor ----
  if (!zoom.active) document.body.style.cursor = hoveredNode ? 'pointer' : 'crosshair';
  else document.body.style.cursor = 'default';

  updateTooltip();
  requestAnimationFrame(frame);
}

// ============================================================
//  INIT
// ============================================================
resize();
initParticles();
requestAnimationFrame(frame);

setTimeout(() => { document.getElementById('hint').style.opacity = '0'; }, 5000);
</script>

</body>
</html>
